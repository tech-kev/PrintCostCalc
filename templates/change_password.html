{% extends "base.html" %}
{% block title %}Passwort ändern — PrintCostCalc{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <h3 class="mb-4">Passwort ändern</h3>
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="post">
                    <div class="mb-3">
                        <label for="current_password" class="form-label">Aktuelles Passwort</label>
                        <input type="password" class="form-control" id="current_password"
                               name="current_password" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label">Neues Passwort</label>
                        <input type="password" class="form-control" id="new_password"
                               name="new_password" required minlength="4">
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Neues Passwort bestätigen</label>
                        <input type="password" class="form-control" id="confirm_password"
                               name="confirm_password" required minlength="4">
                    </div>
                    <button type="submit" class="btn btn-primary">Passwort ändern</button>
                    <a href="{{ url_for('calculation_new') }}" class="btn btn-outline-secondary ms-2">Abbrechen</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
